<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Validation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000000;
            color: white;
            padding: 30px;
        }

        form {
            max-width: 450px;
            margin: auto;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #00e5ff;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #00e5ff;
        }

        input, textarea {
            width: 100%;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background: #00e5ff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #80f1ff;
            transition: 0.3s ease;
        }

        button:hover {
            background: #c8c8c8;
        }
        button:active{
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<form onsubmit="return validateForm()">

    <h2>Patient Details</h2>

    <label for="age">Age</label>
    <input type="number" id="age">
    <div class="error" id="ageError"></div>

    <label for="notes">Medical History</label>
    <textarea id="notes" rows="4"></textarea>
    <div class="error" id="notesError"></div>

    <button type="submit">Submit</button>

</form>

<script>
    function validateForm() {
        let age = document.getElementById("age").value;
        let notes = document.getElementById("notes").value;

        let ageError = document.getElementById("ageError");
        let notesError = document.getElementById("notesError");

        ageError.textContent = "";
        notesError.textContent = "";

        let isValid = true;


        if (age < 1 || age > 120 || age === "") {
            ageError.textContent = "Age must be between 1 and 120.";
            isValid = false;
        }

        if (notes.length < 10 || notes.length > 200) {
            notesError.textContent =
                "Medical history must be between 10 and 200 characters.";
            isValid = false;
        }

        return isValid;
    }
</script>

</body>
</html>
