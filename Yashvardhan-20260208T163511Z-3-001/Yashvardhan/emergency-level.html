<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Priority</title>
    <link rel="stylesheet" href="responsive.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: black;
            color: white;
            margin: 0;
        }
        h2 {
            color: #00e5ff;
        }
        select, button {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #00e5ff;
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        select:hover, button:hover {
            background-color: #333;
            transition: 0.3s ease;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            color: #ffd54f;
        }
    </style>
</head>
<body>

    <h2>Select Emergency Severity</h2>

    <select id="severity">
        <option value="">-- Select Severity --</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
    </select>

    <button onclick="checkPriority()">Check Priority</button>

    <p class="result"></p>

    <script>
        function checkPriority() {
            const severity = document.getElementById("severity").value;
            const result = document.querySelector(".result");

            switch (severity) {
                case "High":
                    result.textContent = "🚨 High Priority: Immediate medical attention required!";
                    result.style.color = "red";
                    break;

                case "Medium":
                    result.textContent = "⚠️ Medium Priority: Doctor consultation recommended soon.";
                    result.style.color = "orange";
                    break;

                case "Low":
                    result.textContent = "ℹ️ Low Priority: Routine check-up is sufficient.";
                    result.style.color = "green";
                    break;

                default:
                    result.textContent = "Please select a severity level.";
                    result.style.color = "black";
            }
        }
    </script>

</body>
</html>
