<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Media</title>
    <link rel="stylesheet" href="responsive.css">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00e5ff;
        }
        h2 {
            color: #ffd54f;
            margin-top: 30px;
        }
        .section {
            margin-bottom: 40px;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
        }
        video, iframe {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Hospital Media & Information</h1>

    <div class="section">
        <h2>Hospital Introduction Video</h2>
        <video width="600" controls>
            <source src="hospital_intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="section">
        <h2>Background Audio</h2>
        <audio controls>
            <source src="hospital_bg.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="section">
        <h2>Hospital Location</h2>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d130.15953309734817!2d121.35225726918871!3d-71.57839520386025!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xae5e536b648543cb%3A0xc8512108a99d74dd!2sAgartha!5e1!3m2!1sen!2sin!4v1769614007075!5m2!1sen!2sins"
            width="600"
            height="450"
            style="border: 0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>
</body>
</html>
