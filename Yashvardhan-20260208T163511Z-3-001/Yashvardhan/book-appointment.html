<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <form class="appForm" onsubmit="return validateForm()">

        <div class="name">
            <label>Name</label>
            <input type="text" id="name" placeholder="John Doe">

            <label>Email</label>
            <input type="email" id="mail">

            <label>Number</label>
            <input type="tel" id="tele" placeholder="+91 xxxxxxxxxx">
        </div>

        <div class="dropdownSection">
            <select id="department">
                <option value="">-- Select Department --</option>
                <option value="Pediatrics">Pediatrics</option>
                <option value="Radiology">Radiology</option>
                <option value="Cardiology">Cardiology</option>
            </select>
        </div>

        <div class="selectionSection">
            <label>
                <input type="radio" name="gender" value="Male"> Male
            </label>
            <label>
                <input type="radio" name="gender" value="Female"> Female
            </label>
            <label>
                <input type="radio" name="gender" value="Unknown" checked> Prefer Not To Say
            </label>
        </div>

        <button type="submit" class="submit">Submit</button>
    </form>

    <script>
    function validateForm() {
        const name = document.getElementById("name")
        const mail = document.getElementById("mail")
        const tele = document.getElementById("tele")
        const department = document.getElementById("department");

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^(\+91[\-\s]?)?[6-9][0-9]{9}$/;


        name.classList.remove("redBorder");
        mail.classList.remove("redBorder");
        tele.classList.remove("redBorder");
        department.classList.remove("redBorder");

        

        if (name.value.trim() === "") {
            name.classList.add("redBorder");
            name.focus();
            alert("Name is required");
            return false;
            
        }

        if (mail.value.trim() === "") {
            mail.classList.add("redBorder");
            mail.focus();
            alert("Email is required");
            return false;
            
        }

        if (!emailRegex.test(mail.value.trim())) {
            mail.classList.add("redBorder");
            mail.focus();
            alert("Email format is invalid");
            return false;
            
        }

        if (tele.value.trim() === "") {
            tele.classList.add("redBorder");
            tele.focus();
            alert("Phone number is required");
            return false;
        }

        if (!phoneRegex.test(tele.value.trim())) {
            tele.classList.add("redBorder");
            tele.focus();
            alert("Enter a valid 10-digit Indian mobile number");
            return false;
        }

        if (department.value === "") {
            department.classList.add("redBorder");
            department.focus();
            alert("Please select a department");
            return false;
        }

        alert("Appointment booked successfully!");
        window.location.href = "appointments.html";
        return false;
    }
    </script>

</body>
</html>
