<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Validation - Hospital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="realtime-validation.css">
</head>
<body>
    <div class="navContainer">
        <nav>
            <ul>
                <li><a href="index.html">Home Page</a></li>
                <li><a href="about-department.html" target="_blank">Department Page</a></li>
                <li><a href="services.html" target="_blank">Services Page</a></li>
                <li><a href="doctors.html" target="_blank">Doctors Page</a></li>
                <li><a href="age-validation.html" target="_blank">Book Appointment</a></li>
                <li><a href="navigation.html" target="_blank">More Services</a></li>
            </ul>
        </nav>
    </div>

    <div class="content-wrapper">
        <div class="form-container">
            <h1>Real-Time Validation</h1>

            <form id="realtimeForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@hospital.com" oninput="validateEmail()">
                    <div class="validation-message" id="emailMsg"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 98765 43210" oninput="validatePhone()">
                    <div class="validation-message" id="phoneMsg"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password Strength</label>
                    <input type="password" id="password" placeholder="Enter password" oninput="validatePasswordStrength()">
                    <div class="validation-message" id="passwordMsg"></div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-submit" id="submitBtn" disabled>Submit</button>
                    <button type="reset" class="btn-reset" onclick="resetForm()">Reset</button>
                </div>
            </form>

            <div class="info-box">
                <strong>Real-Time Validation:</strong> This form validates as you type. Email must be valid format, phone must be 10 digits (Indian format), and password must be strong.
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById("email");
        const phoneInput = document.getElementById("phone");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("submitBtn");

        function validateEmail() {
            const email = emailInput.value;
            const emailMsg = document.getElementById("emailMsg");
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (email === "") {
                emailMsg.className = "validation-message";
                emailInput.classList.remove("valid", "invalid");
                return false;
            }

            if (emailRegex.test(email)) {
                emailMsg.textContent = "✓ Valid email";
                emailMsg.className = "validation-message success";
                emailInput.classList.add("valid");
                emailInput.classList.remove("invalid");
                checkFormValidity();
                return true;
            } else {
                emailMsg.textContent = "✗ Invalid email format";
                emailMsg.className = "validation-message error";
                emailInput.classList.add("invalid");
                emailInput.classList.remove("valid");
                submitBtn.disabled = true;
                return false;
            }
        }

        function validatePhone() {
            const phone = phoneInput.value;
            const phoneMsg = document.getElementById("phoneMsg");
            const phoneRegex = /^(\+91[\-\s]?)?[6-9][0-9]{9}$/;

            if (phone === "") {
                phoneMsg.className = "validation-message";
                phoneInput.classList.remove("valid", "invalid");
                return false;
            }

            if (phoneRegex.test(phone)) {
                phoneMsg.textContent = "✓ Valid phone number";
                phoneMsg.className = "validation-message success";
                phoneInput.classList.add("valid");
                phoneInput.classList.remove("invalid");
                checkFormValidity();
                return true;
            } else {
                phoneMsg.textContent = "✗ Enter valid 10-digit Indian phone number";
                phoneMsg.className = "validation-message error";
                phoneInput.classList.add("invalid");
                phoneInput.classList.remove("valid");
                submitBtn.disabled = true;
                return false;
            }
        }

        function validatePasswordStrength() {
            const password = passwordInput.value;
            const passwordMsg = document.getElementById("passwordMsg");

            if (password === "") {
                passwordMsg.className = "validation-message";
                passwordInput.classList.remove("valid", "invalid");
                return false;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;

            if (strength <= 2) {
                passwordMsg.textContent = "⚠ Weak password (need 8+ chars, uppercase, lowercase, number, special char)";
                passwordMsg.className = "validation-message warning";
                passwordInput.classList.add("invalid");
                passwordInput.classList.remove("valid");
                submitBtn.disabled = true;
            } else if (strength <= 3) {
                passwordMsg.textContent = "◐ Fair password - improve strength";
                passwordMsg.className = "validation-message warning";
                passwordInput.classList.add("invalid");
                passwordInput.classList.remove("valid");
                submitBtn.disabled = true;
            } else {
                passwordMsg.textContent = "✓ Strong password";
                passwordMsg.className = "validation-message success";
                passwordInput.classList.add("valid");
                passwordInput.classList.remove("invalid");
                checkFormValidity();
            }
            return strength > 3;
        }

        function checkFormValidity() {
            const isEmailValid = validateEmail();
            const isPhoneValid = validatePhone();
            const isPasswordValid = validatePasswordStrength();

            submitBtn.disabled = !(isEmailValid && isPhoneValid && isPasswordValid);
        }

        function resetForm() {
            document.getElementById("realtimeForm").reset();
            emailInput.classList.remove("valid", "invalid");
            phoneInput.classList.remove("valid", "invalid");
            passwordInput.classList.remove("valid", "invalid");
            document.getElementById("emailMsg").className = "validation-message";
            document.getElementById("phoneMsg").className = "validation-message";
            document.getElementById("passwordMsg").className = "validation-message";
            submitBtn.disabled = true;
        }

        document.getElementById("realtimeForm").addEventListener("submit", function(e) {
            e.preventDefault();
            if (validateEmail() && validatePhone() && validatePasswordStrength()) {
                alert("Form submitted successfully!");
            }
        });

        submitBtn.disabled = true;
    </script>
</body>
</html>
