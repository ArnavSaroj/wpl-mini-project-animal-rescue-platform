<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Hospital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        
        .navContainer {
            background-color: #1a1a1a;
            border-bottom: 2px solid rgb(255, 255, 255);
            width: 100%;
            box-sizing: border-box;
        }
        
        .navContainer nav ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .navContainer nav ul li {
            color: white;
            padding: 12px 16px;
            display: inline-block;
            cursor: pointer;
        }
        
        .navContainer nav ul li:hover {
            background-color: #333;
            transition: 0.3s ease;
        }
        
        .navContainer nav ul li a {
            color: white;
            text-decoration: none;
        }
        
        .content-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 40px 20px;
        }
        
        .billing-container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            border: 2px solid #00e5ff;
            width: 100%;
            max-width: 600px;
        }
        
        .billing-container h1 {
            color: #00e5ff;
            text-align: center;
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            color: #00e5ff;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        
        .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            box-sizing: border-box;
        }
        
        .input-group select:hover,
        .input-group select:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
            outline: none;
        }
        
        .input-group select option {
            background-color: #333;
            color: white;
        }
        
        .secInputSection {
            margin-bottom: 25px;
        }
        
        .secInputSection select {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            box-sizing: border-box;
        }
        
        .secInputSection select:hover,
        .secInputSection select:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
            outline: none;
        }
        
        .secInputSection select option {
            background-color: #333;
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: linear-gradient(135deg, #00e5ff 0%, #81d4fa 100%);
            color: #000;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: linear-gradient(135deg, #ffd54f 0%, #ffeb3b 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background-color: #2d2d2d;
            border-left: 4px solid #ffd54f;
            border-radius: 4px;
            display: none;
        }
        
        .result-section.active {
            display: block;
        }
        
        .result-section h3 {
            color: #00e5ff;
            margin-top: 0;
        }
        
        .result-section p {
            color: #ccc;
            margin: 8px 0;
            font-size: 1.1rem;
        }
        
        .total-amount {
            color: #ffd54f;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="navContainer">
        <nav>
            <ul>
                <li><a href="index.html">Home Page</a></li>
                <li><a href="about-department.html" target="_blank">Department Page</a></li>
                <li><a href="services.html" target="_blank">Services Page</a></li>
                <li><a href="doctors.html" target="_blank">Doctors Page</a></li>
                <li><a href="age-validation.html" target="_blank">Book Appointment</a></li>
                <li><a href="navigation.html" target="_blank">More Services</a></li>
            </ul>
        </nav>
    </div>
    
    <div class="content-wrapper">
        <div class="billing-container">
            <h1>Billing Calculator</h1>
            
            <div class="input-group">
                <label for="department">Select Department:</label>
                <select name="department" id="department" onchange="setProcedure()">
                    <option value="" selected disabled>-- Choose a Department --</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Radiology">Radiology</option>
                    <option value="Cardiology">Cardiology</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="procedure">Select Procedures:</label>
                <div class="secInputSection"></div>
            </div>
            
            <div class="button-group">
                <button onclick="totalBill()">Calculate Total</button>
                <button onclick="resetBilling()">Reset</button>
            </div>
            
            <div class="result-section" id="resultSection">
                <h3>Billing Summary</h3>
                <div id="billDetails"></div>
                <div class="total-amount">Total Amount: <span id="totalAmount">$0.00</span></div>
            </div>
        </div>
    </div>
    
    <script src="billing.js"></script>
    <script>
        function resetBilling() {
            document.getElementById("department").value = "";
            document.querySelector(".secInputSection").innerHTML = "";
            document.getElementById("resultSection").classList.remove("active");
            document.getElementById("billDetails").innerHTML = "";
        }
    </script>
</body>
</html>
