<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors</title>
    <link rel="stylesheet" href="responsive.css">

    <style>

        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        
        ol {
            list-style: none;              
            padding-left: 0;
            color: #00e5ff;                
        }

       
        ol > li {
            font-size: 1.4em;              
            margin-bottom: 25px;
        }

        
        ul {
            margin-top: 10px;
            margin-left: 40px;             
            color: #ffd54f;                
        }

        ul li {
            list-style-type: square;      
            font-size: 1em;
            padding: 6px 0;
            text-decoration: underline;
        }

        ul li:hover {
            color: #ff5252;              
            cursor: pointer;
        }

        ol > li:first-child {
            color: #81d4fa;              
        }

        ol > li:last-child {
            color: #b39ddb;
        }

        h1 {
            text-align: center;
            border-bottom: 1px solid white;
            padding-bottom: 10px;
        }

        
    </style>
</head>

<body>
    <h1>Our Departments and Doctors</h1>

    <ol>
        <li>Cardiology
            <ul id="cardiology-doctors">
            </ul>
        </li>

        <li>Pediatrics
            <ul>
                <li>Dr. Amit Singh</li>
                <li>Dr. Sean Combs</li>
                <li>Dr. Jeffery</li>
            </ul>
        </li>

        <li>Radiology
            <ul>
                <li>Dr. Marie Curie</li>
                <li>Dr. Oppenheimer</li>
                <li>Dr. G.R.R Luther</li>
            </ul>
        </li>
    </ol>

        <script>
        const cardiologyDoctors = [
            "Dr. AK Bala",
            "Dr. Amit Shah",
            "Dr. Veer Singh"
        ];
        const ul = document.getElementById("cardiology-doctors");

        for (let i = 0; i < cardiologyDoctors.length; i++) {
            const li = document.createElement("li");
            li.textContent = cardiologyDoctors[i];
            ul.appendChild(li);
        }
    </script>

</body>
</html>
