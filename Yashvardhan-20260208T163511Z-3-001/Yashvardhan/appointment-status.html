<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Slots</title>
    <link rel="stylesheet" href="responsive.css">
    <style>
        body {
            margin: 20px;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
        }
        h3 {
            color: #00e5ff;
        }
        input[type="time"], button {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #00e5ff;
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="time"]:hover, button:hover {
            background-color: #333;
            transition: 0.3s ease;
        }
        .result {
            color: #ffd54f;
        }
        .slots {
            list-style: none;
            padding: 0;
        }
        .slots li {
            background-color: #1a1a1a;
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #00e5ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <input type="time" name="time" id="time">
        <button onclick="submitTime()">Submit</button>
    </div>

    <h3>Available Appointment Slots</h3>
    <ul class="slots"></ul>

    <p class="result"></p>

    <script src="generate.js"></script>
</body>
</html>
