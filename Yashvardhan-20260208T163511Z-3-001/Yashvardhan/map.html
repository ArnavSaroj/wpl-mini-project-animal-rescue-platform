<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Layout</title>
    <link rel="stylesheet" href="map.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <h2>Interactive Hospital Layout</h2>

    <div class="imgContainer">
        <img src="Layout.png" alt="Hospital Layout" usemap="#hospitalmap">

        <div class="caption">
            Click on different sections of the hospital layout to explore departments and services.
        </div>

        <map name="hospitalmap">
            <area shape="rect"
                  coords="797, 364, 1120, 663"
                  href="about-department.html"
                  alt="Emergency Ward"
                  title="Emergency Ward"
                  target="_blank">

            <area shape="rect"
                  coords="403, 298, 528, 463"
                  href="services.html"
                  alt="Pharmacy"
                  title="Pharmacy"
                  target="_blank">
        </map>
    </div>
</body>
</html>
